<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crivit Rower - WiFi Setup</title>
    <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f4f6fb" media="(prefers-color-scheme: light)">
    <script>
        // Apply persisted theme before paint to avoid flash of incorrect theme.
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                if (stored === 'light' || stored === 'dark') {
                    document.documentElement.setAttribute('data-theme', stored);
                }
            } catch (e) { /* ignore */ }
        })();
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root, :root[data-theme="dark"] {
            --bg: #0b1020;
            --bg-page: radial-gradient(1100px 700px at 0% -10%, #1a224a 0%, transparent 60%),
                       radial-gradient(900px 700px at 110% 0%, #0e2a4a 0%, transparent 55%),
                       linear-gradient(160deg, #070b1c 0%, #0e1330 100%);
            --card: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.10);
            --input-bg: rgba(0, 0, 0, 0.30);
            --input-border: rgba(255, 255, 255, 0.18);
            --text: #f4f6fb;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #0ea5e9;
            --on-accent: #07192b;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --shadow-lg: 0 18px 48px rgba(2, 6, 23, 0.4);
            color-scheme: dark;
        }
        :root[data-theme="light"] {
            --bg: #f4f6fb;
            --bg-page: radial-gradient(1100px 700px at 0% -10%, #e0f2fe 0%, transparent 60%),
                       radial-gradient(900px 700px at 110% 0%, #ecfeff 0%, transparent 55%),
                       linear-gradient(180deg, #f7f9fd 0%, #eef2f9 100%);
            --card: #ffffff;
            --card-border: rgba(15, 23, 42, 0.08);
            --input-bg: #ffffff;
            --input-border: rgba(15, 23, 42, 0.18);
            --text: #0f172a;
            --text-muted: #4b5563;
            --accent: #0284c7;
            --accent-strong: #0369a1;
            --on-accent: #ffffff;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
            --shadow-lg: 0 18px 48px rgba(15, 23, 42, 0.12);
            color-scheme: light;
        }
        @media (prefers-color-scheme: light) {
            :root:not([data-theme]) {
                --bg: #f4f6fb;
                --bg-page: radial-gradient(1100px 700px at 0% -10%, #e0f2fe 0%, transparent 60%),
                           radial-gradient(900px 700px at 110% 0%, #ecfeff 0%, transparent 55%),
                           linear-gradient(180deg, #f7f9fd 0%, #eef2f9 100%);
                --card: #ffffff;
                --card-border: rgba(15, 23, 42, 0.08);
                --input-bg: #ffffff;
                --input-border: rgba(15, 23, 42, 0.18);
                --text: #0f172a;
                --text-muted: #4b5563;
                --accent: #0284c7;
                --accent-strong: #0369a1;
                --on-accent: #ffffff;
                --success: #16a34a;
                --warning: #d97706;
                --danger: #dc2626;
                --shadow-lg: 0 18px 48px rgba(15, 23, 42, 0.12);
                color-scheme: light;
            }
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-page);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text);
            padding: 24px 16px 32px;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .container { max-width: 440px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 28px; position: relative; }
        header h1 { font-size: 1.5rem; margin-bottom: 6px; letter-spacing: -0.01em; }
        header p { color: var(--text-muted); font-size: 0.9rem; }

        .theme-toggle {
            position: absolute;
            top: -4px;
            right: 0;
            background: var(--card);
            border: 1px solid var(--card-border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: transform 0.1s ease, border-color 0.2s ease, background 0.2s ease;
        }
        .theme-toggle:hover { border-color: var(--accent); transform: translateY(-1px); }
        .theme-toggle .theme-icon-light,
        .theme-toggle .theme-icon-dark { display: none; }
        :root[data-theme="dark"] .theme-toggle .theme-icon-light { display: inline; }
        :root[data-theme="light"] .theme-toggle .theme-icon-dark { display: inline; }
        :root:not([data-theme]) .theme-toggle .theme-icon-light { display: inline; }
        @media (prefers-color-scheme: light) {
            :root:not([data-theme]) .theme-toggle .theme-icon-light { display: none; }
            :root:not([data-theme]) .theme-toggle .theme-icon-dark { display: inline; }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 18px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-lg);
        }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 14px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .network-list { max-height: 220px; overflow-y: auto; }
        .network-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
            margin-bottom: 8px;
            background: transparent;
            border: 1px solid transparent;
        }
        .network-item:hover { background: var(--card); border-color: var(--card-border); }
        .network-item.selected {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent);
        }
        .network-name { font-weight: 500; }
        .network-info {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-muted); font-size: 0.85rem;
        }
        .signal-strength { display: flex; gap: 2px; }
        .signal-bar { width: 4px; background: var(--success); border-radius: 1px; }
        .signal-bar.weak { height: 6px; }
        .signal-bar.medium { height: 10px; }
        .signal-bar.strong { height: 14px; }
        .signal-bar.inactive { background: rgba(148, 163, 184, 0.4); }
        .lock-icon { font-size: 0.9rem; }

        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.1s ease, opacity 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: var(--on-accent);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.28);
        }
        .btn-primary:hover { box-shadow: 0 8px 26px rgba(14, 165, 233, 0.38); }
        .btn-secondary {
            background: var(--card);
            border-color: var(--card-border);
            color: var(--text);
            margin-top: 10px;
        }
        .btn-scan {
            background: var(--card);
            border-color: var(--card-border);
            color: var(--accent);
            margin-bottom: 14px;
        }
        .status-message {
            text-align: center;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 14px;
            display: none;
            font-weight: 500;
        }
        .status-message.success {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
            border: 1px solid rgba(74, 222, 128, 0.3);
            display: block;
        }
        .status-message.error {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.3);
            display: block;
        }
        .status-message.info {
            background: rgba(96, 165, 250, 0.15);
            color: var(--accent);
            border: 1px solid rgba(96, 165, 250, 0.3);
            display: block;
        }
        .current-status {
            text-align: center;
            padding: 12px;
            background: rgba(74, 222, 128, 0.10);
            border-color: rgba(74, 222, 128, 0.25);
            border-radius: 12px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .current-status.ap-mode {
            background: rgba(251, 191, 36, 0.10);
            border-color: rgba(251, 191, 36, 0.25);
            color: var(--warning);
        }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(148, 163, 184, 0.35);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .skip-link {
            display: block;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 22px;
            font-size: 0.9rem;
            transition: color 0.15s ease;
        }
        .skip-link:hover { color: var(--accent); }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚣 Crivit Rowing Monitor</h1>
            <p>WiFi Setup</p>
            <button id="btn-theme-toggle" class="theme-toggle" type="button"
                    aria-label="Toggle color theme" title="Toggle light/dark theme">
                <span class="theme-icon-light" aria-hidden="true">🌙</span>
                <span class="theme-icon-dark" aria-hidden="true">☀️</span>
            </button>
        </header>

        <div id="status-message" class="status-message"></div>

        <div id="current-status" class="card current-status ap-mode">
            <span id="mode-text">Access Point Mode</span>
        </div>

        <div class="card">
            <h2>Connect to WiFi Network</h2>
            
            <button id="btn-scan" class="btn btn-scan">
                🔍 Scan for Networks
            </button>

            <div id="network-list" class="network-list">
                <p style="color: var(--text-muted); text-align: center;">Click "Scan" to find networks</p>
            </div>
        </div>

        <div class="card">
            <h2>Network Credentials</h2>
            <form id="wifi-form">
                <div class="form-group">
                    <label for="ssid">Network Name (SSID)</label>
                    <input type="text" id="ssid" name="ssid" placeholder="Select or enter network name" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password">
                </div>
                <button type="submit" id="btn-connect" class="btn btn-primary">
                    Connect
                </button>
            </form>
        </div>

        <div class="card" id="forget-card" style="display: none;">
            <h2>Forget Saved Network</h2>
            <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 0.9em;">
                Clear saved WiFi credentials and stay in AP mode.
            </p>
            <button id="btn-forget" class="btn btn-secondary">
                Forget Network
            </button>
        </div>

        <a href="/" class="skip-link">Skip setup and go to Rowing Monitor →</a>
    </div>

    <script>
        let selectedNetwork = null;
        let networksData = [];

        // Set up event listeners on DOM load
        document.addEventListener('DOMContentLoaded', function() {
            checkStatus();
            
            // Theme toggle
            const themeBtn = document.getElementById('btn-theme-toggle');
            if (themeBtn) {
                const updateLabel = () => {
                    const stored = (function () { try { return localStorage.getItem('theme'); } catch (e) { return null; } })();
                    const effective = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
                    const next = effective === 'dark' ? 'Switch to light theme' : 'Switch to dark theme';
                    themeBtn.setAttribute('aria-label', next);
                    themeBtn.setAttribute('title', next);
                };
                updateLabel();
                themeBtn.addEventListener('click', function () {
                    const stored = (function () { try { return localStorage.getItem('theme'); } catch (e) { return null; } })();
                    const effective = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
                    const next = effective === 'dark' ? 'light' : 'dark';
                    try { localStorage.setItem('theme', next); } catch (e) { /* ignore */ }
                    document.documentElement.setAttribute('data-theme', next);
                    updateLabel();
                });
            }

            // Scan button
            document.getElementById('btn-scan').addEventListener('click', scanNetworks);
            
            // Form submit
            document.getElementById('wifi-form').addEventListener('submit', connectWifi);
            
            // Forget button
            document.getElementById('btn-forget').addEventListener('click', forgetWifi);
            
            // Network list - event delegation for dynamically added items
            document.getElementById('network-list').addEventListener('click', function(e) {
                const item = e.target.closest('.network-item');
                if (item && item.dataset.ssid) {
                    selectNetwork(item.dataset.ssid, item);
                }
            });
        });

        async function checkStatus() {
            try {
                const response = await fetch('/api/wifi/status');
                const data = await response.json();
                
                const statusEl = document.getElementById('current-status');
                const modeText = document.getElementById('mode-text');
                const forgetCard = document.getElementById('forget-card');
                
                if (data.mode === 'sta' && data.connected) {
                    statusEl.classList.remove('ap-mode');
                    modeText.innerHTML = '✅ Connected to <strong>' + data.staSSID + '</strong>';
                    forgetCard.style.display = 'block';
                } else if (data.staConfigured) {
                    statusEl.classList.add('ap-mode');
                    modeText.innerHTML = '⚠️ Configured for <strong>' + data.staSSID + '</strong> but not connected';
                    forgetCard.style.display = 'block';
                } else {
                    statusEl.classList.add('ap-mode');
                    modeText.textContent = '📡 Access Point Mode - ' + data.apSSID;
                    forgetCard.style.display = 'none';
                }
            } catch (e) {
                console.error('Status check failed:', e);
            }
        }

        async function scanNetworks() {
            const btn = document.getElementById('btn-scan');
            const listEl = document.getElementById('network-list');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Scanning...';
            listEl.innerHTML = '<p style="color: var(--text-muted); text-align: center;">Scanning...</p>';
            
            try {
                const response = await fetch('/api/wifi/scan');
                const data = await response.json();
                networksData = data.networks || [];
                
                if (networksData.length > 0) {
                    listEl.innerHTML = '';
                    networksData.forEach((net, index) => {
                        const item = document.createElement('div');
                        item.className = 'network-item';
                        item.dataset.ssid = net.ssid;
                        item.dataset.index = index;
                        
                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'network-name';
                        nameSpan.textContent = net.ssid;
                        
                        const infoSpan = document.createElement('span');
                        infoSpan.className = 'network-info';
                        infoSpan.innerHTML = (net.secure ? '<span class="lock-icon">🔒</span>' : '') + getSignalBars(net.rssi);
                        
                        item.appendChild(nameSpan);
                        item.appendChild(infoSpan);
                        listEl.appendChild(item);
                    });
                } else {
                    listEl.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No networks found</p>';
                }
            } catch (e) {
                listEl.innerHTML = '<p style="color: var(--danger); text-align: center;">Scan failed: ' + e.message + '</p>';
            }
            
            btn.disabled = false;
            btn.innerHTML = '🔍 Scan for Networks';
        }

        function selectNetwork(ssid, el) {
            document.querySelectorAll('.network-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('ssid').value = ssid;
            selectedNetwork = ssid;
        }

        function getSignalBars(rssi) {
            const strength = rssi > -50 ? 3 : rssi > -70 ? 2 : 1;
            return `<span class="signal-strength">
                <span class="signal-bar weak ${strength >= 1 ? '' : 'inactive'}"></span>
                <span class="signal-bar medium ${strength >= 2 ? '' : 'inactive'}"></span>
                <span class="signal-bar strong ${strength >= 3 ? '' : 'inactive'}"></span>
            </span>`;
        }


        async function connectWifi(event) {
            event.preventDefault();
            
            const ssid = document.getElementById('ssid').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-connect');
            const statusEl = document.getElementById('status-message');
            
            if (!ssid) {
                showStatus('Please enter a network name', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Saving...';
            
            try {
                const response = await fetch('/api/wifi/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ssid, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const redirectUrl = data.redirect_url || 'http://rower.local';
                    let countdown = data.redirect_delay || 5;
                    
                    // Show success with countdown
                    const updateCountdown = () => {
                        if (countdown > 0) {
                            showStatus(`✅ ${data.message || 'Credentials saved!'} Rebooting in ${countdown}...`, 'success');
                            countdown--;
                            setTimeout(updateCountdown, 1000);
                        } else {
                            // Trigger reboot
                            fetch('/api/reboot', { method: 'POST' }).catch(() => {});
                            
                            // Show final message with green styling
                            const statusEl = document.getElementById('status-message');
                            statusEl.innerHTML = `
                                <div style="background: #166534; color: white; padding: 30px; border-radius: 12px; text-align: center;">
                                    <h2 style="margin: 0 0 15px 0; font-size: 1.5em;">✅ Setup Complete!</h2>
                                    <p style="margin: 0 0 15px 0;">The device is rebooting and will connect to your WiFi.</p>
                                    <p style="margin: 0 0 20px 0; font-size: 0.9em; opacity: 0.9;">
                                        1. Close this page<br>
                                        2. Connect your phone to your home WiFi<br>
                                        3. Open <strong>${redirectUrl}</strong> in your browser
                                    </p>
                                    <p style="margin: 0; font-size: 0.8em; opacity: 0.7;">
                                        You can now close this captive portal.
                                    </p>
                                </div>
                            `;
                            statusEl.className = 'status-message';  // Remove any error/success class
                            
                            // Try to close the captive portal window (works on some devices)
                            try {
                                window.close();
                            } catch (e) {}
                        }
                    };
                    updateCountdown();
                } else {
                    showStatus('❌ Failed: ' + (data.error || 'Unknown error'), 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Connect';
                }
            } catch (e) {
                showStatus('❌ Connection failed: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Connect';
            }
        }

        async function forgetWifi() {
            try {
                const response = await fetch('/api/wifi/disconnect', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ WiFi credentials cleared. Device will use AP mode on next reboot.', 'success');
                    checkStatus();
                } else {
                    showStatus('❌ Failed to clear credentials', 'error');
                }
            } catch (e) {
                showStatus('❌ Error: ' + e.message, 'error');
            }
        }

        function showStatus(message, type) {
            const el = document.getElementById('status-message');
            el.className = 'status-message ' + type;
            el.textContent = message;
            el.style.display = 'block';
            
            if (type !== 'error') {
                setTimeout(() => {
                    el.style.display = 'none';
                }, 10000);
            }
        }
    </script>
</body>
</html>
